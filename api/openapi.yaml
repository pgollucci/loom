openapi: 3.0.3
info:
  title: Loom API
  description: The Loom API provides programmatic access to the agent orchestration system.
  version: 1.0.0
  contact:
    name: Loom Support
    url: https://github.com/jordanhubbard/loom

servers:
  - url: https://localhost:8443
    description: HTTPS server (production)
  - url: http://localhost:8081
    description: HTTP server (development)

security:
  - ApiKeyAuth: []

tags:
  - name: Health & Status
    description: System health and status endpoints
  - name: Authentication
    description: User authentication and authorization
  - name: Personas
    description: Agent persona management
  - name: Agents
    description: Agent lifecycle and management
  - name: Projects
    description: Project management and configuration
  - name: Beads
    description: Work item (bead) management
  - name: Decisions
    description: Decision bead management
  - name: Conversations
    description: Conversation and chat management
  - name: Comments
    description: Bead comments and annotations
  - name: Analytics
    description: Usage analytics and cost tracking
  - name: Events
    description: Real-time event streaming and history
  - name: Notifications
    description: User notifications and preferences
  - name: Motivations
    description: Agent motivation and idle state management
  - name: Workflows
    description: Workflow definition and execution
  - name: Git Operations
    description: Git repository operations
  - name: File Management
    description: File locks and access control
  - name: Connectors
    description: External service connectors
  - name: Providers
    description: LLM provider management
  - name: CEO REPL
    description: CEO command execution interface
  - name: Pair Programming
    description: Pair programming chat interface
  - name: System
    description: System configuration and state
  - name: Cache
    description: Response cache management
  - name: Logging
    description: Application logging and export
  - name: Webhooks
    description: External webhook integrations

paths:
  /api/v1/health:
    get:
      summary: Health check
      tags:
        - Health & Status
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                  uptime_seconds:
                    type: integer

  /api/v1/auth/login:
    post:
      summary: User login
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful

  /api/v1/auth/me:
    get:
      summary: Get current user
      tags:
        - Authentication
      responses:
        '200':
          description: Current user information

  /api/v1/personas:
    get:
      summary: List all personas
      tags:
        - Personas
      responses:
        '200':
          description: List of personas

  /api/v1/agents:
    get:
      summary: List all agents
      tags:
        - Agents
      responses:
        '200':
          description: List of agents
    post:
      summary: Create a new agent
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Agent created

  /api/v1/projects:
    get:
      summary: List all projects
      tags:
        - Projects
      responses:
        '200':
          description: List of projects
    post:
      summary: Create a new project
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Project created

  /api/v1/beads:
    get:
      summary: List beads
      tags:
        - Beads
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of beads
    post:
      summary: Create a new bead
      tags:
        - Beads
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - project_id
              properties:
                title:
                  type: string
                description:
                  type: string
                type:
                  type: string
                priority:
                  type: integer
                project_id:
                  type: string
      responses:
        '201':
          description: Bead created

  /api/v1/beads/{id}:
    get:
      summary: Get bead details
      tags:
        - Beads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bead details
    patch:
      summary: Update a bead
      tags:
        - Beads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Bead updated

  /api/v1/beads/{id}/claim:
    post:
      summary: Claim a bead
      tags:
        - Beads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agent_id
              properties:
                agent_id:
                  type: string
      responses:
        '200':
          description: Bead claimed

  /api/v1/beads/{id}/redispatch:
    post:
      summary: Redispatch a bead
      tags:
        - Beads
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Bead redispatched

  /api/v1/analytics/logs:
    get:
      summary: Get analytics logs
      tags:
        - Analytics
      parameters:
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Analytics logs

  /api/v1/analytics/costs:
    get:
      summary: Get cost report
      tags:
        - Analytics
      responses:
        '200':
          description: Cost report

  /api/v1/events/stream:
    get:
      summary: Stream events
      tags:
        - Events
      responses:
        '200':
          description: Event stream

  /api/v1/chat/completions:
    post:
      summary: Chat completion
      tags:
        - Pair Programming
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Chat completion response

  /api/v1/pair:
    post:
      summary: Pair programming chat
      tags:
        - Pair Programming
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Pair chat response

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        role:
          type: string

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        persona:
          type: string
        status:
          type: string

    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string

    Persona:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
